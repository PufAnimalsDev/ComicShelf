<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ComicShelf</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="wrap">
      <h1>ComicShelf</h1>
      <p class="lead">Katalog Marvel PL — oznaczaj posiadane i przeczytane tomy. Dane zapisują się automatycznie w tej przeglądarce.</p>
    </div>
  </header>
  <main class="wrap" style="padding:0 20px">
    <section class="stats">
      <div class="stat"><strong id="ownedCount">0</strong><span>posiadanych</span></div>
      <div class="stat"><strong id="missingCount">0</strong><span>brakujących</span></div>
      <div class="stat"><strong id="readCount">0</strong><span>przeczytanych</span></div>
      <div class="stat"><strong id="unreadCount">0</strong><span>nieprzeczytanych</span></div>
      <div class="stat"><strong id="percent">0%</strong><span>ukończenia kolekcji</span><div class="progress"><div id="bar"></div></div></div>
    </section>
    <section class="controls">
      <input id="search" placeholder="Szukaj po tytule, oryginale lub zawartości…">
      <select id="collection"><option value="">Wszystkie kolekcje</option></select>
      <select id="status">
        <option value="all">Wszystkie wg posiadania</option>
        <option value="owned">Posiadane</option>
        <option value="missing">Brakujące</option>
      </select>
      <select id="readStatus">
        <option value="all">Wszystkie wg czytania</option>
        <option value="read">Przeczytane</option>
        <option value="unread">Nieprzeczytane</option>
      </select>
    </section>
    <div class="actions">
      <button class="primary" id="markVisible">Oznacz widoczne jako posiadane</button>
      <button id="unmarkVisible">Odznacz posiadanie</button>
      <button id="markReadVisible">Oznacz widoczne jako przeczytane</button>
      <button id="unmarkReadVisible">Odznacz przeczytanie</button>
      <button id="exportBtn">Eksportuj kopię</button>
      <button id="importBtn">Importuj kopię</button>
      <input type="file" id="importFile" accept="application/json" hidden>
      <button id="resetBtn">Wyczyść kolekcję</button>
    </div>
    <section id="list" class="list"></section>
  </main>
  <footer>ComicShelf · offline · kopie JSON</footer>
  <script src="data/marvel-pl.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/backup.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
